<!DOCTYPE html>
<html>

<head>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@900&display=swap');

        body {
            margin: 0;
            background: black;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 1000px;
            height: 1000px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        svg {
            width: 800px;
            height: 800px;
        }

        .text {
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            font-size: 110px;
            fill: white;
            letter-spacing: 5px;
        }
    </style>
</head>

<body>
    <div class="container">
        <svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
            <!-- Outer Pin -->
            <path
                d="M250 30 C 150 30, 70 110, 70 210 C 70 330, 250 460, 250 460 C 250 460, 430 330, 430 210 C 430 110, 350 30, 250 30Z"
                fill="none" stroke="white" stroke-width="15" stroke-linecap="round" stroke-linejoin="round" />

            <!-- Inner Pin -->
            <path
                d="M250 80 C 180 80, 125 135, 125 205 C 125 285, 250 390, 250 390 C 250 390, 375 285, 375 205 C 375 135, 320 80, 250 80Z"
                fill="none" stroke="white" stroke-width="15" stroke-linecap="round" stroke-linejoin="round" />

            <!-- Purple Path -->
            <path d="M210 115 C 180 135, 155 185, 155 210 C 155 250, 185 300, 220 320" fill="none" stroke="#6614F2"
                stroke-width="15" stroke-linecap="round" />
            <circle cx="230" cy="110" r="16" fill="#6614F2" />
            <circle cx="210" cy="335" r="16" fill="#6614F2" />

            <!-- Coral Path -->
            <path d="M290 135 C 330 160, 345 220, 345 245 L 210 430" fill="none" stroke="#FF6B6B" stroke-width="15"
                stroke-linecap="round" />
            <circle cx="290" cy="138" r="16" fill="#FF6B6B" />
            <circle cx="225" cy="405" r="16" fill="#FF6B6B" />
            <circle cx="205" cy="435" r="16" fill="#FF6B6B" />

            <!-- TRENDER Text -->
            <text x="250" y="520" text-anchor="middle" class="text">TRENDER</text>
        </svg>
    </div>
</body>

</html>
